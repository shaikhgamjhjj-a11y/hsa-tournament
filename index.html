<div class="card">
  <h3>🎮 Room Details</h3>
  <p id="room"></p>
</div>

<script>
let roomData = {
  "Solo": "Room ID: 12345 | Pass: 111",
  "Duo": "Room ID: 67890 | Pass: 222",
  "Squad": "Room ID: 54321 | Pass: 333"
};

function join(fee,type){
  if(wallet >= fee){
    wallet -= fee;
    updateWallet();

    document.getElementById("status").innerText =
    "✅ Joined " + type + " Match";

    document.getElementById("room").innerText =
    roomData[type];
  } else {
    document.getElementById("status").innerText =
    "❌ Not enough balance";
  }
}
</script>
