<!DOCTYPE html>
<html>
<head>
  <title>HSA Tournament</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(black, red);
      color: white;
      text-align: center;
    }

    .card {
      background: #222;
      margin: 20px;
      padding: 20px;
      border-radius: 10px;
    }

    button {
      padding: 10px;
      background: orange;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    input {
      padding: 10px;
      margin: 10px;
    }
  </style>
</head>

<body>

<h1>🔥 HSA Tournament</h1>

<h2>💰 Wallet: ₹<span id="wallet">100</span></h2>

<input type="number" id="addMoney" placeholder="Add Money">
<button onclick="addMoney()">Add</button>

<div class="card">
  <h2>Solo Match</h2>
  <p>Entry: ₹10</p>
  <button onclick="joinMatch(10, 'Solo')">Join</button>
</div>

<div class="card">
  <h2>Duo Match</h2>
  <p>Entry: ₹20</p>
  <button onclick="joinMatch(20, 'Duo')">Join</button>
</div>

<div class="card">
  <h2>Squad Match</h2>
  <p>Entry: ₹50</p>
  <button onclick="joinMatch(50, 'Squad')">Join</button>
</div>

<h2 id="status"></h2>

<script>
let wallet = 100;

function updateWallet(){
  document.getElementById("wallet").innerText = wallet;
}

function addMoney(){
  let amount = parseInt(document.getElementById("addMoney").value);
  if(amount > 0){
    wallet += amount;
    updateWallet();
  }
}

function joinMatch(fee, type){
  if(wallet >= fee){
    wallet -= fee;
    updateWallet();
    document.getElementById("status").innerText =
    "✅ Joined " + type + " Match";
  } else {
    document.getElementById("status").innerText =
    "❌ Not enough balance";
  }
}
</script>

</body>
</html>
