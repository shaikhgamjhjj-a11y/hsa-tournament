<!DOCTYPE html>
<html>
<head>
  <title>HSA Tournament</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(black, purple);
      color: white;
      text-align: center;
    }

    .card {
      background: #222;
      margin: 20px;
      padding: 20px;
      border-radius: 10px;
      border: 2px solid red;
      box-shadow: 0 0 10px red;
    }

    button {
      padding: 10px 20px;
      background: linear-gradient(orange, red);
      border: none;
      border-radius: 5px;
      cursor: pointer;
      color: white;
    }

    input {
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }
  </style>
</head>

<body>

<img src="logo.png" width="120">
<h1>🔥 HSA Tournament</h1>

<!-- LOGIN -->
<div id="loginBox">
  <input id="name" placeholder="Enter Name">
  <button onclick="login()">Login</button>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none;">

<h2>👤 Player: <span id="player"></span></h2>
<h2>💰 Wallet: ₹<span id="wallet"></span></h2>

<!-- QR PAYMENT -->
<div class="card">
  <h3>💳 Add Money</h3>
  <img src="qr.png" width="200">
  <p>QR scan karo aur payment karo</p>
  <button onclick="window.open('https://wa.me/918104382208')">
    Send Payment Screenshot
  </button>
</div>

<div class="card">
  <h3>Solo Match</h3>
  <p>Entry ₹10 | Prize ₹100</p>
  <button onclick="join(10,'Solo')">Join</button>
</div>

<div class="card">
  <h3>Duo Match</h3>
  <p>Entry ₹20 | Prize ₹200</p>
  <button onclick="join(20,'Duo')">Join</button>
</div>

<div class="card">
  <h3>Squad Match</h3>
  <p>Entry ₹50 | Prize ₹500</p>
  <button onclick="join(50,'Squad')">Join</button>
</div>

<div class="card">
  <h3>🎮 Room Details</h3>
  <p id="room">Join karne ke baad dikhega</p>
</div>

<h2 id="status"></h2>

</div>

<script>
let wallet = localStorage.getItem("wallet") || 0;
let player = localStorage.getItem("player");

let roomData = {
  "Solo": "Room ID: 12345 | Pass: 111",
  "Duo": "Room ID: 67890 | Pass: 222",
  "Squad": "Room ID: 54321 | Pass: 333"
};

if(player){
  showApp();
}

function login(){
  let name = document.getElementById("name").value;
  if(name){
    localStorage.setItem("player", name);
    showApp();
  }
}

function showApp(){
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("app").style.display = "block";

  player = localStorage.getItem("player");
  wallet = parseInt(localStorage.getItem("wallet")) || 0;

  document.getElementById("player").innerText = player;
  updateWallet();
}

function updateWallet(){
  document.getElementById("wallet").innerText = wallet;
  localStorage.setItem("wallet", wallet);
}

function join(fee,type){
  if(wallet >= fee){
    wallet -= fee;
    updateWallet();

    document.getElementById("status").innerText =
    "✅ Joined " + type;

    document.getElementById("room").innerText =
    roomData[type];
  } else {
    document.getElementById("status").innerText =
    "❌ Balance kam hai";
  }
}
</script>

</body>
</html>
